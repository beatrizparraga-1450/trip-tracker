<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip Cost Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --bg: #111318;
    --surface: #1c1f26;
    --surface2: #252830;
    --border: #2e3139;
    --text: #f0f0f0;
    --muted: #888;
    --dim: #555;
    --accent: #5b8dee;
    --accent-dim: rgba(91,141,238,0.15);
    --green: #4caf82;
    --amber: #e6a817;
    --red: #e05555;
    --font: 'Inter', system-ui, sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Auth screen ── */
  #auth-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }

  .auth-logo {
    font-size: 52px;
    margin-bottom: 20px;
  }

  .auth-title {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 8px;
  }

  .auth-sub {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 36px;
    line-height: 1.6;
  }

  .google-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #fff;
    color: #1a1a1a;
    border: none;
    border-radius: 12px;
    padding: 14px 24px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  .google-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
  .google-btn:active { transform: translateY(0); }

  .google-icon {
    width: 20px;
    height: 20px;
  }

  /* ── App layout ── */
  #app { display: none; max-width: 560px; margin: 0 auto; padding-bottom: 90px; }

  /* ── Header ── */
  .header {
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 50;
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 0;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .trip-switcher {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    cursor: pointer;
    color: var(--text);
    font-family: var(--font);
    transition: border-color 0.15s;
    flex: 1;
    margin-right: 10px;
  }
  .trip-switcher:hover { border-color: var(--accent); }

  .trip-switcher-emoji { font-size: 20px; }
  .trip-switcher-name { font-weight: 700; font-size: 14px; text-align: left; flex: 1; }
  .trip-switcher-dest { font-size: 11px; color: var(--muted); }
  .trip-switcher-arrow { color: var(--muted); font-size: 11px; }

  .add-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
    font-family: var(--font);
  }
  .add-btn:hover { opacity: 0.88; }

  /* ── Budget bar ── */
  .budget-bar {
    margin-bottom: 12px;
  }

  .budget-labels {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .budget-labels strong { color: var(--text); }

  .progress-track {
    background: var(--surface2);
    border-radius: 6px;
    height: 6px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.4s ease;
  }

  .budget-caption {
    text-align: right;
    font-size: 11px;
    color: var(--dim);
    margin-top: 4px;
  }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 4px;
    padding-bottom: 14px;
  }

  .tab {
    flex: 1;
    padding: 7px 0;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: var(--font);
    transition: all 0.15s;
  }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ── User bar ── */
  .user-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
  }

  .user-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    object-fit: cover;
  }

  .user-name { font-size: 12px; color: var(--muted); flex: 1; }

  .sign-out-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    font-family: var(--font);
  }
  .sign-out-btn:hover { color: var(--text); border-color: var(--muted); }

  /* ── Content ── */
  .content { padding: 14px 16px; }

  /* ── Date groups ── */
  .date-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
    margin-top: 4px;
  }

  /* ── Expense card ── */
  .expense-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }

  .expense-left { flex: 1; min-width: 0; }
  .expense-desc {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .expense-notes { font-size: 12px; color: var(--dim); margin-top: 4px; }

  .expense-right { text-align: right; flex-shrink: 0; }
  .expense-amount { font-weight: 700; font-size: 15px; color: var(--accent); }
  .expense-actions { display: flex; gap: 6px; margin-top: 6px; justify-content: flex-end; }

  .cat-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
  }

  /* ── Action btns ── */
  .btn-edit {
    background: var(--surface2);
    border: none;
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    font-family: var(--font);
  }
  .btn-edit:hover { color: var(--text); }

  .btn-del {
    background: rgba(224,85,85,0.12);
    border: none;
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 11px;
    color: var(--red);
    cursor: pointer;
    font-family: var(--font);
  }

  /* ── Summary ── */
  .summary-total {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 14px;
  }

  .summary-total-label {
    font-size: 11px;
    color: var(--dim);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }

  .summary-total-amount {
    font-size: 34px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.03em;
  }

  .summary-total-count {
    font-size: 12px;
    color: var(--dim);
    margin-top: 4px;
  }

  .cat-section-label {
    font-size: 11px;
    color: var(--dim);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 10px;
  }

  .cat-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }

  .cat-row-top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .cat-row-name { font-weight: 600; font-size: 14px; }
  .cat-row-amount { font-weight: 700; font-size: 14px; }
  .cat-row-meta { font-size: 11px; color: var(--dim); margin-top: 3px; }

  /* ── Trip list ── */
  .trip-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.15s;
  }
  .trip-card:hover { border-color: var(--accent); }
  .trip-card.active { background: var(--accent-dim); border-color: rgba(91,141,238,0.4); }

  .trip-card-emoji { font-size: 28px; }
  .trip-card-info { flex: 1; }
  .trip-card-name { font-weight: 700; font-size: 15px; }
  .trip-card-dest { font-size: 12px; color: var(--muted); }
  .trip-card-meta { font-size: 12px; color: var(--dim); margin-top: 2px; }
  .trip-card-check { font-size: 18px; color: var(--accent); }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    padding: 56px 0;
    color: var(--dim);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-title { font-size: 16px; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
  .empty-sub { font-size: 13px; }
  .empty-sub strong { color: var(--accent); }

  /* ── Search ── */
  .search-input {
    width: 100%;
    padding: 10px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    font-family: var(--font);
    outline: none;
    margin-bottom: 14px;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--dim); }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 16px;
    backdrop-filter: blur(2px);
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 22px;
    width: 100%;
    max-width: 460px;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
  }

  .modal-title { font-weight: 700; font-size: 17px; }

  .modal-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
    padding: 0 4px;
  }

  /* ── Form ── */
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .form-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .form-input, .form-select {
    padding: 10px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 9px;
    color: var(--text);
    font-size: 14px;
    font-family: var(--font);
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
  }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-select { appearance: none; cursor: pointer; }
  .form-select option { background: var(--surface2); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* ── Emoji picker ── */
  .emoji-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
  }

  .emoji-btn {
    font-size: 22px;
    width: 40px;
    height: 40px;
    border-radius: 8px;
    border: 2px solid transparent;
    background: var(--surface2);
    cursor: pointer;
    transition: all 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .emoji-btn.selected { border-color: var(--accent); background: var(--accent-dim); }

  /* ── Button row ── */
  .btn-row { display: flex; gap: 10px; margin-top: 6px; }

  .btn-primary {
    flex: 1;
    padding: 11px 16px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    font-family: var(--font);
    transition: opacity 0.15s;
  }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary:not(:disabled):hover { opacity: 0.88; }

  .btn-primary.danger { background: var(--red); }

  .btn-secondary {
    padding: 11px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    font-family: var(--font);
  }
  .btn-secondary:hover { color: var(--text); }

  .btn-ghost {
    width: 100%;
    padding: 11px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    font-family: var(--font);
    margin-top: 8px;
    text-align: center;
  }
  .btn-ghost:hover { color: var(--text); }

  .btn-danger-ghost {
    width: 100%;
    padding: 11px 16px;
    background: rgba(224,85,85,0.08);
    border: 1px solid rgba(224,85,85,0.25);
    border-radius: 10px;
    color: var(--red);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    font-family: var(--font);
    margin-top: 8px;
    text-align: center;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    opacity: 0;
    transition: all 0.25s;
    z-index: 200;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Loading ── */
  #loading {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--muted)">Loading…</div>
</div>

<div id="auth-screen" style="display:none">
  <div class="auth-logo">✈️</div>
  <div class="auth-title">Trip Cost Tracker</div>
  <div class="auth-sub">Track spending across all your trips.<br>Sign in to sync across all your devices.</div>
  <button class="google-btn" onclick="signInWithGoogle()">
    <svg class="google-icon" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </button>
</div>

<div id="app" style="display:none">
  <!-- User bar -->
  <div class="user-bar">
    <img class="user-avatar" id="user-avatar" src="" alt="">
    <span class="user-name" id="user-name"></span>
    <button class="sign-out-btn" onclick="signOut()">Sign out</button>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <button class="trip-switcher" onclick="showView('trips')">
        <span class="trip-switcher-emoji" id="active-emoji">✈️</span>
        <div>
          <div class="trip-switcher-name" id="active-name">Loading…</div>
          <div class="trip-switcher-dest" id="active-dest"></div>
        </div>
        <span class="trip-switcher-arrow">▾</span>
      </button>
      <button class="add-btn" onclick="openAddExpense()">+ Add</button>
    </div>

    <div class="budget-bar" id="budget-bar" style="display:none">
      <div class="budget-labels">
        <span>Spent: <strong id="spent-label">—</strong></span>
        <span id="remaining-label" style="color:var(--green)"></span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="budget-caption" id="budget-caption"></div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="expenses" onclick="showView('expenses')">Expenses</button>
      <button class="tab" data-tab="summary" onclick="showView('summary')">Summary</button>
    </div>
  </div>

  <!-- Views -->
  <div class="content">
    <div id="view-expenses"></div>
    <div id="view-summary" style="display:none"></div>
    <div id="view-trips" style="display:none"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbSignOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, collection, getDocs, getDoc, setDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── Firebase config ──────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyBLI4PHZX-2FWx5g2ycAqJOwomYZTyPwlU",
  authDomain: "trips-tracker-bp.firebaseapp.com",
  projectId: "trips-tracker-bp",
  storageBucket: "trips-tracker-bp.firebasestorage.app",
  messagingSenderId: "914667122810",
  appId: "1:914667122810:web:3cd4ddc552af077ca58bc3"
};

const firebaseApp = initializeApp(firebaseConfig);
const auth = getAuth(firebaseApp);
const db = getFirestore(firebaseApp);

// ── Constants ────────────────────────────────────────────────────────────────
const CATEGORIES = [
  { id: "accommodation", label: "Accommodation", icon: "🏨", color: "#5b8dee" },
  { id: "transport",     label: "Transport",     icon: "🚗", color: "#4caf82" },
  { id: "food",          label: "Food & Drink",  icon: "🍽️", color: "#e6a817" },
  { id: "activities",    label: "Activities",    icon: "🎒", color: "#b85cbb" },
  { id: "shopping",      label: "Shopping",      icon: "🛍️", color: "#e07535" },
  { id: "toll",          label: "Tolls & Parking",icon: "🅿️", color: "#4caf82" },
  { id: "health",        label: "Health",        icon: "💊", color: "#e05555" },
  { id: "other",         label: "Other",         icon: "📌", color: "#888" },
];
const CURRENCIES = ["EUR","GBP","USD","CHF"];
const EMOJIS = ["🏔️","🏖️","🌍","🗺️","✈️","🚂","🏕️","🌴","🎿","🚢","🏙️","🌺"];

// ── State ────────────────────────────────────────────────────────────────────
let currentUser = null;
let trips = [];
let activeTripId = null;
let currentView = "expenses";
let modalStack = [];
let unsubscribeTrips = null;

function activeTrip() { return trips.find(t => t.id === activeTripId) || trips[0]; }
function expenses()   { return activeTrip()?.expenses || []; }
function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }
function today() { return new Date().toISOString().split("T")[0]; }
function fmt(n, cur = "EUR") {
  return new Intl.NumberFormat("en-GB", { style: "currency", currency: cur, minimumFractionDigits: 2 }).format(n || 0);
}

// ── Auth ─────────────────────────────────────────────────────────────────────
window.signInWithGoogle = async () => {
  try {
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
  } catch(e) { console.error(e); toast("Sign in failed. Please try again."); }
};

window.signOut = async () => {
  if (unsubscribeTrips) unsubscribeTrips();
  await fbSignOut(auth);
};

onAuthStateChanged(auth, async user => {
  document.getElementById("loading").style.display = "none";
  if (user) {
    currentUser = user;
    document.getElementById("auth-screen").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("user-avatar").src = user.photoURL || "";
    document.getElementById("user-name").textContent = user.displayName || user.email;
    await loadTrips();
  } else {
    currentUser = null;
    document.getElementById("auth-screen").style.display = "flex";
    document.getElementById("app").style.display = "none";
  }
});

// ── Firestore ────────────────────────────────────────────────────────────────
function userDoc() { return doc(db, "users", currentUser.uid); }
function tripsCol() { return collection(db, "users", currentUser.uid, "trips"); }
function expensesCol(tripId) { return collection(db, "users", currentUser.uid, "trips", tripId, "expenses"); }

async function loadTrips() {
  if (unsubscribeTrips) unsubscribeTrips();

  unsubscribeTrips = onSnapshot(tripsCol(), async (snapshot) => {
    const loaded = [];
    for (const d of snapshot.docs) {
      const trip = { id: d.id, ...d.data(), expenses: [] };
      const expSnap = await getDocs(expensesCol(d.id));
      expSnap.forEach(e => trip.expenses.push({ id: e.id, ...e.data() }));
      loaded.push(trip);
    }
    trips = loaded.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

    // Seed Dolomites trip for new users
    if (trips.length === 0) {
      await seedDolomitesTrip();
      return;
    }

    if (!activeTripId || !trips.find(t => t.id === activeTripId)) {
      activeTripId = trips[0]?.id;
    }

    render();
  });
}

async function seedDolomitesTrip() {
  const id = uid();
  await setDoc(doc(tripsCol(), id), {
    name: "Dolomites 2026",
    destination: "Italy",
    startDate: "2026-06-19",
    endDate: "2026-06-30",
    currency: "EUR",
    budget: 2000,
    emoji: "🏔️",
    createdAt: Date.now(),
  });
}

// ── Render ───────────────────────────────────────────────────────────────────
function render() {
  const trip = activeTrip();
  if (!trip) return;

  // Header
  document.getElementById("active-emoji").textContent = trip.emoji || "✈️";
  document.getElementById("active-name").textContent = trip.name;
  document.getElementById("active-dest").textContent = trip.destination || "";

  // Budget
  const exps = expenses();
  const spent = exps.reduce((s,e) => s + (e.amount || 0), 0);
  const budget = trip.budget || 0;
  const budgetBar = document.getElementById("budget-bar");

  if (budget > 0) {
    budgetBar.style.display = "block";
    const pct = Math.min((spent / budget) * 100, 100);
    const remaining = budget - spent;
    document.getElementById("spent-label").textContent = fmt(spent, trip.currency);
    const remEl = document.getElementById("remaining-label");
    if (remaining < 0) {
      remEl.textContent = `Over by ${fmt(Math.abs(remaining), trip.currency)}`;
      remEl.style.color = "var(--red)";
    } else {
      remEl.textContent = `${fmt(remaining, trip.currency)} left`;
      remEl.style.color = pct > 85 ? "var(--amber)" : "var(--green)";
    }
    const fill = document.getElementById("progress-fill");
    fill.style.width = pct + "%";
    fill.style.background = pct > 90 ? "var(--red)" : pct > 75 ? "var(--amber)" : "var(--accent)";
    document.getElementById("budget-caption").textContent = `Budget: ${fmt(budget, trip.currency)}`;
  } else {
    budgetBar.style.display = "none";
  }

  // Tabs
  document.querySelectorAll(".tab").forEach(t => {
    t.classList.toggle("active", t.dataset.tab === currentView);
  });

  // Views
  document.getElementById("view-expenses").style.display = currentView === "expenses" ? "block" : "none";
  document.getElementById("view-summary").style.display  = currentView === "summary"  ? "block" : "none";
  document.getElementById("view-trips").style.display    = currentView === "trips"    ? "block" : "none";

  if (currentView === "expenses") renderExpenses();
  if (currentView === "summary")  renderSummary();
  if (currentView === "trips")    renderTrips();
}

function renderExpenses() {
  const el = document.getElementById("view-expenses");
  const exps = expenses();
  const trip = activeTrip();

  if (exps.length === 0) {
    el.innerHTML = `<div class="empty">
      <div class="empty-icon">🧾</div>
      <div class="empty-title">No expenses yet</div>
      <div class="empty-sub">Tap <strong>+ Add</strong> to log your first one</div>
    </div>`;
    return;
  }

  const searchVal = document.getElementById("search-val")?.value?.toLowerCase() || "";
  const filtered = exps
    .filter(e => !searchVal || e.desc?.toLowerCase().includes(searchVal) || e.notes?.toLowerCase().includes(searchVal))
    .sort((a, b) => (b.date || "").localeCompare(a.date || ""));

  const byDate = {};
  filtered.forEach(e => {
    const d = e.date || "Unknown date";
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(e);
  });

  const dates = Object.keys(byDate).sort((a, b) => b.localeCompare(a));

  let html = exps.length > 2 ? `<input class="search-input" id="search-val" placeholder="Search expenses…" oninput="renderExpensesOnly()" value="${searchVal}">` : "";

  if (filtered.length === 0) {
    html += `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">No results</div></div>`;
  } else {
    dates.forEach(date => {
      const label = date !== "Unknown date"
        ? new Date(date + "T12:00:00").toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short" })
        : "Unknown date";
      html += `<div class="date-label">${label}</div>`;
      byDate[date].forEach(e => {
        const cat = CATEGORIES.find(c => c.id === e.category) || CATEGORIES[7];
        html += `<div class="expense-card">
          <div class="expense-left">
            <div class="expense-desc">${esc(e.desc || "")}</div>
            <span class="cat-pill" style="background:${cat.color}22;color:${cat.color};border:1px solid ${cat.color}44">${cat.icon} ${cat.label}</span>
            ${e.notes ? `<div class="expense-notes">${esc(e.notes)}</div>` : ""}
          </div>
          <div class="expense-right">
            <div class="expense-amount">${fmt(e.amount, e.currency || trip.currency)}</div>
            <div class="expense-actions">
              <button class="btn-edit" onclick="openEditExpense('${e.id}')">Edit</button>
              <button class="btn-del" onclick="confirmDeleteExpense('${e.id}')">Del</button>
            </div>
          </div>
        </div>`;
      });
    });
  }

  el.innerHTML = html;
  if (searchVal) document.getElementById("search-val")?.focus();
}

window.renderExpensesOnly = renderExpenses;

function renderSummary() {
  const el = document.getElementById("view-summary");
  const exps = expenses();
  const trip = activeTrip();
  const spent = exps.reduce((s,e) => s + (e.amount || 0), 0);

  let html = `<div class="summary-total">
    <div class="summary-total-label">Total spent</div>
    <div class="summary-total-amount">${fmt(spent, trip.currency)}</div>
    <div class="summary-total-count">${exps.length} expense${exps.length !== 1 ? "s" : ""}</div>`;

  if (trip.budget > 0) {
    const pct = Math.min((spent / trip.budget) * 100, 100);
    const remaining = trip.budget - spent;
    const color = pct > 90 ? "var(--red)" : pct > 75 ? "var(--amber)" : "var(--accent)";
    html += `<div style="margin-top:14px">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-top:5px">
        <span>Budget: ${fmt(trip.budget, trip.currency)}</span>
        <span style="color:${remaining < 0 ? "var(--red)" : "var(--green)"}">
          ${remaining < 0 ? `Over by ${fmt(Math.abs(remaining), trip.currency)}` : `${fmt(remaining, trip.currency)} remaining`}
        </span>
      </div>
    </div>`;
  }
  html += `</div>`;

  if (exps.length > 0) {
    const byCat = CATEGORIES.map(c => ({
      ...c,
      total: exps.filter(e => e.category === c.id).reduce((s,e) => s + e.amount, 0),
      count: exps.filter(e => e.category === c.id).length,
    })).filter(c => c.count > 0).sort((a,b) => b.total - a.total);

    html += `<div class="cat-section-label">By category</div>`;
    byCat.forEach(c => {
      const pct = spent > 0 ? (c.total / spent) * 100 : 0;
      html += `<div class="cat-row">
        <div class="cat-row-top">
          <span class="cat-row-name">${c.icon} ${c.label}</span>
          <span class="cat-row-amount" style="color:${c.color}">${fmt(c.total, trip.currency)}</span>
        </div>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${c.color}"></div></div>
        <div class="cat-row-meta">${pct.toFixed(0)}% · ${c.count} item${c.count !== 1 ? "s" : ""}</div>
      </div>`;
    });
  } else {
    html += `<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">Add expenses to see your summary</div></div>`;
  }

  html += `<button class="btn-ghost" onclick="openEditTrip()">✏️ Edit trip details</button>`;
  html += `<button class="btn-danger-ghost" onclick="confirmDeleteTrip()">🗑️ Delete this trip</button>`;

  el.innerHTML = html;
}

function renderTrips() {
  const el = document.getElementById("view-trips");
  let html = `<div class="cat-section-label">Your trips</div>`;

  trips.forEach(t => {
    const spent = (t.expenses || []).reduce((s,e) => s + (e.amount || 0), 0);
    const isActive = t.id === activeTripId;
    html += `<div class="trip-card ${isActive ? "active" : ""}" onclick="selectTrip('${t.id}')">
      <div class="trip-card-emoji">${t.emoji || "✈️"}</div>
      <div class="trip-card-info">
        <div class="trip-card-name">${esc(t.name)}</div>
        ${t.destination ? `<div class="trip-card-dest">${esc(t.destination)}</div>` : ""}
        <div class="trip-card-meta">${fmt(spent, t.currency)} · ${(t.expenses||[]).length} expense${(t.expenses||[]).length !== 1 ? "s" : ""}</div>
      </div>
      ${isActive ? `<span class="trip-card-check">✓</span>` : ""}
    </div>`;
  });

  html += `<button class="btn-primary" style="width:100%;margin-top:4px" onclick="openAddTrip()">+ New trip</button>`;
  html += `<button class="btn-ghost" onclick="showView('expenses')">Back</button>`;
  el.innerHTML = html;
}

// ── Views ────────────────────────────────────────────────────────────────────
window.showView = (view) => {
  currentView = view;
  render();
};

window.selectTrip = (id) => {
  activeTripId = id;
  currentView = "expenses";
  render();
};

// ── Expense CRUD ─────────────────────────────────────────────────────────────
window.openAddExpense = () => {
  const trip = activeTrip();
  showModal("Add expense", expenseForm({ currency: trip.currency, date: today(), category: "food" }, false, async (f) => {
    await setDoc(doc(expensesCol(trip.id), uid()), {
      desc: f.desc, amount: parseFloat(f.amount), currency: f.currency,
      category: f.category, date: f.date, notes: f.notes || "", createdAt: Date.now()
    });
    closeModal();
    toast("Expense added ✓");
    await refreshExpenses(trip.id);
    render();
  }));
};

window.openEditExpense = (id) => {
  const e = expenses().find(x => x.id === id);
  if (!e) return;
  showModal("Edit expense", expenseForm(e, true, async (f) => {
    const trip = activeTrip();
    await updateDoc(doc(expensesCol(trip.id), id), {
      desc: f.desc, amount: parseFloat(f.amount), currency: f.currency,
      category: f.category, date: f.date, notes: f.notes || ""
    });
    closeModal();
    toast("Saved ✓");
    await refreshExpenses(trip.id);
    render();
  }));
};

window.confirmDeleteExpense = (id) => {
  showModal("Delete expense?", `
    <p style="color:var(--muted);font-size:14px;margin-bottom:20px">This expense will be permanently removed.</p>
    <div class="btn-row">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary danger" onclick="deleteExpense('${id}')">Delete</button>
    </div>`);
};

window.deleteExpense = async (id) => {
  const trip = activeTrip();
  await deleteDoc(doc(expensesCol(trip.id), id));
  closeModal();
  toast("Deleted");
  await refreshExpenses(trip.id);
  render();
};

async function refreshExpenses(tripId) {
  const t = trips.find(x => x.id === tripId);
  if (!t) return;
  const snap = await getDocs(expensesCol(tripId));
  t.expenses = [];
  snap.forEach(d => t.expenses.push({ id: d.id, ...d.data() }));
}

// ── Trip CRUD ────────────────────────────────────────────────────────────────
window.openAddTrip = () => {
  showModal("New trip", tripForm({ emoji: "✈️", currency: "EUR" }, false, async (f) => {
    const id = uid();
    await setDoc(doc(tripsCol(), id), {
      name: f.name, destination: f.destination || "", startDate: f.startDate || "",
      endDate: f.endDate || "", currency: f.currency, budget: parseFloat(f.budget) || 0,
      emoji: f.emoji, createdAt: Date.now()
    });
    activeTripId = id;
    currentView = "expenses";
    closeModal();
    toast("Trip created ✓");
  }));
};

window.openEditTrip = () => {
  const trip = activeTrip();
  showModal("Edit trip", tripForm(trip, true, async (f) => {
    await updateDoc(doc(tripsCol(), trip.id), {
      name: f.name, destination: f.destination || "", startDate: f.startDate || "",
      endDate: f.endDate || "", currency: f.currency, budget: parseFloat(f.budget) || 0,
      emoji: f.emoji
    });
    closeModal();
    toast("Trip updated ✓");
  }));
};

window.confirmDeleteTrip = () => {
  const trip = activeTrip();
  showModal("Delete trip?", `
    <p style="color:var(--muted);font-size:14px;margin-bottom:20px">
      This will permanently delete <strong>${esc(trip.name)}</strong> and all its expenses.
    </p>
    <div class="btn-row">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary danger" onclick="deleteTrip('${trip.id}')">Delete</button>
    </div>`);
};

window.deleteTrip = async (id) => {
  // Delete all expenses first
  const snap = await getDocs(expensesCol(id));
  for (const d of snap.docs) await deleteDoc(d.ref);
  await deleteDoc(doc(tripsCol(), id));
  closeModal();
  toast("Trip deleted");
};

// ── Forms ────────────────────────────────────────────────────────────────────
function expenseForm(initial, isEdit, onSave) {
  const catOptions = CATEGORIES.map(c =>
    `<option value="${c.id}" ${initial.category === c.id ? "selected" : ""}>${c.icon} ${c.label}</option>`
  ).join("");
  const curOptions = CURRENCIES.map(c =>
    `<option value="${c}" ${initial.currency === c ? "selected" : ""}>${c}</option>`
  ).join("");

  return `<div>
    <div class="form-group">
      <label class="form-label">Description *</label>
      <input class="form-input" id="f-desc" value="${esc(initial.desc || "")}" placeholder="e.g. Dinner at rifugio">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Amount *</label>
        <input class="form-input" id="f-amount" type="number" min="0" step="0.01" value="${initial.amount || ""}" placeholder="0.00">
      </div>
      <div class="form-group">
        <label class="form-label">Currency</label>
        <select class="form-select" id="f-currency">${curOptions}</select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Category</label>
      <select class="form-select" id="f-category">${catOptions}</select>
    </div>
    <div class="form-group">
      <label class="form-label">Date</label>
      <input class="form-input" id="f-date" type="date" value="${initial.date || today()}">
    </div>
    <div class="form-group">
      <label class="form-label">Notes</label>
      <input class="form-input" id="f-notes" value="${esc(initial.notes || "")}" placeholder="Optional…">
    </div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" id="save-exp-btn" onclick="submitExpenseForm()">${isEdit ? "Save changes" : "Add expense"}</button>
    </div>
  </div>`;

  // attach save fn after render via window
  window._onSaveExpense = onSave;
}

window.submitExpenseForm = () => {
  const desc = document.getElementById("f-desc")?.value?.trim();
  const amount = document.getElementById("f-amount")?.value;
  if (!desc || !amount) { toast("Please fill in description and amount"); return; }
  window._onSaveExpense?.({
    desc,
    amount,
    currency: document.getElementById("f-currency").value,
    category: document.getElementById("f-category").value,
    date: document.getElementById("f-date").value,
    notes: document.getElementById("f-notes").value.trim(),
  });
};

function tripForm(initial, isEdit, onSave) {
  const emojiBtns = EMOJIS.map(e =>
    `<button class="emoji-btn ${initial.emoji === e ? "selected" : ""}" onclick="selectEmoji('${e}',this)">${e}</button>`
  ).join("");
  const curOptions = CURRENCIES.map(c =>
    `<option value="${c}" ${initial.currency === c ? "selected" : ""}>${c}</option>`
  ).join("");

  window._onSaveTrip = onSave;
  window._selectedEmoji = initial.emoji || "✈️";

  return `<div>
    <div class="form-group">
      <label class="form-label">Pick an emoji</label>
      <div class="emoji-grid">${emojiBtns}</div>
    </div>
    <div class="form-group">
      <label class="form-label">Trip name *</label>
      <input class="form-input" id="t-name" value="${esc(initial.name || "")}" placeholder="e.g. Dolomites 2026">
    </div>
    <div class="form-group">
      <label class="form-label">Destination</label>
      <input class="form-input" id="t-dest" value="${esc(initial.destination || "")}" placeholder="e.g. Italy">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Start date</label>
        <input class="form-input" id="t-start" type="date" value="${initial.startDate || ""}">
      </div>
      <div class="form-group">
        <label class="form-label">End date</label>
        <input class="form-input" id="t-end" type="date" value="${initial.endDate || ""}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Currency</label>
        <select class="form-select" id="t-currency">${curOptions}</select>
      </div>
      <div class="form-group">
        <label class="form-label">Budget</label>
        <input class="form-input" id="t-budget" type="number" min="0" value="${initial.budget || ""}" placeholder="0.00">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="submitTripForm()">${isEdit ? "Save changes" : "Create trip"}</button>
    </div>
  </div>`;
}

window.selectEmoji = (e, btn) => {
  window._selectedEmoji = e;
  document.querySelectorAll(".emoji-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
};

window.submitTripForm = () => {
  const name = document.getElementById("t-name")?.value?.trim();
  if (!name) { toast("Please enter a trip name"); return; }
  window._onSaveTrip?.({
    name,
    emoji: window._selectedEmoji || "✈️",
    destination: document.getElementById("t-dest").value.trim(),
    startDate: document.getElementById("t-start").value,
    endDate: document.getElementById("t-end").value,
    currency: document.getElementById("t-currency").value,
    budget: document.getElementById("t-budget").value,
  });
};

// ── Modal ────────────────────────────────────────────────────────────────────
function showModal(title, content) {
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };
  overlay.innerHTML = `<div class="modal">
    <div class="modal-header">
      <span class="modal-title">${title}</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="modal-body">${content}</div>
  </div>`;
  document.body.appendChild(overlay);
  modalStack.push(overlay);
}

window.closeModal = () => {
  const overlay = modalStack.pop();
  if (overlay) overlay.remove();
};

// ── Toast ────────────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2200);
}

// ── Utils ────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
